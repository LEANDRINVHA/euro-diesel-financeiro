<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>EURO DIESEL | AUDITORIA MASTER V7</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com/"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&family=Inter:wght@300;900&display=swap');
        :root { --euro-blue: #0062ff; --euro-dark: #0a0c10; --euro-border: #1f2937; }
        body { font-family: 'Inter', sans-serif; background: var(--euro-dark); color: #f1f5f9; margin: 0; padding: 20px; }
        .master-panel { background: #0d1117; border: 1px solid var(--euro-border); border-radius: 12px; }
        .stat-card { border-left: 3px solid var(--euro-blue); }
        .btn-action { background: #1f2937; border: 1px solid #374151; transition: 0.2s; cursor: pointer; }
        .btn-action:hover { border-color: var(--euro-blue); color: var(--euro-blue); }
        .neon-text { text-shadow: 0 0 10px rgba(0, 98, 255, 0.5); }
    </style>
</head>
<body class="p-6 md:p-10">

    <header class="flex flex-col lg:flex-row justify-between items-start lg:items-end mb-10 gap-8">
        <div>
            <h1 class="text-4xl font-black tracking-tighter neon-text uppercase">EURO DIESEL <span class="text-blue-500 font-light text-3xl">Finance</span></h1>
            <p class="text-[11px] font-bold text-slate-500 uppercase tracking-widest">RESPONSÁVEL TÉCNICO: <span class="text-slate-300">Leandrin® Master Admin</span></p>
        </div>

        <div class="flex flex-wrap gap-3">
            <button onclick="document.getElementById('fileInput').click()" class="btn-action text-white px-5 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest flex items-center gap-2">
                <span class="text-blue-500 text-lg">📑</span> Importar Boleto (IA)
            </button>
            <input type="file" id="fileInput" class="hidden" accept=".pdf" onchange="processarPDFDinamico(this)">

            <button onclick="gerarRelatorioBI()" class="btn-action text-white px-5 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest flex items-center gap-2">
                <span class="text-emerald-500 text-lg">📈</span> Relatórios BI Luxo
            </button>
            
            <button onclick="carregarContabilidade()" class="bg-blue-600 text-white px-8 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-blue-700 transition shadow-lg shadow-blue-900/40 uppercase">
                Sincronizar Banco
            </button>
        </div>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-5 gap-4 mb-10">
        <div class="master-panel stat-card p-5 border-blue-500"><p class="text-[9px] font-black text-slate-500 uppercase mb-2">Hoje</p><h2 id="rec-hoje" class="text-xl font-black text-white">R$ 0,00</h2></div>
        <div class="master-panel stat-card p-5 border-indigo-500"><p class="text-[9px] font-black text-slate-500 uppercase mb-2">Semana</p><h2 id="rec-semana" class="text-xl font-black text-white">R$ 0,00</h2></div>
        <div class="master-panel stat-card p-5 border-emerald-500"><p class="text-[9px] font-black text-slate-500 uppercase mb-2">Mês</p><h2 id="rec-mes" class="text-xl font-black text-emerald-400">R$ 0,00</h2></div>
        <div class="master-panel stat-card p-5 border-amber-500"><p class="text-[9px] font-black text-slate-500 uppercase mb-2">Ano</p><h2 id="rec-ano" class="text-xl font-black text-amber-500">R$ 0,00</h2></div>
        <div class="master-panel stat-card p-5 border-purple-500"><p class="text-[9px] font-black text-slate-500 uppercase mb-2">Próximos 12 Meses</p><h2 id="rec-total" class="text-xl font-black text-purple-400">R$ 0,00</h2></div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-10">
        <div class="lg:col-span-2">
            <div class="master-panel overflow-hidden">
                <div class="p-6 border-b border-gray-800 bg-gray-900/30 flex justify-between items-center">
                    <h3 class="text-xs font-black uppercase tracking-widest text-slate-400">Auditoria Live Feed</h3>
                    <span id="total-titulos" class="text-[10px] text-blue-500 font-bold uppercase">0 Títulos Ativos</span>
                </div>
                <table class="w-full text-left">
                    <tbody id="audit-body" class="divide-y divide-gray-800"></tbody>
                </table>
            </div>
        </div>
        <div class="master-panel p-8">
            <h3 class="text-[10px] font-black text-blue-500 uppercase mb-8 tracking-[0.4em] text-center">Top Pagadores (R$)</h3>
            <canvas id="chartFast"></canvas>
        </div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
        
        const CONFIG = {
            url: "https://sfpdbzfaiyrhwitiflbv.supabase.co",
            key: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNmcGRiemZhaXlyaHdpdGlmbGJ2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNTg0MzgsImV4cCI6MjA5MDgzNDQzOH0.t84JuNn-qqBJyb-IPK0x4fbYTfsJK_R80Rp4SBpsupM"
        };
        const _db = supabase.createClient(CONFIG.url, CONFIG.key);

        async function processarPDFDinamico(input) {
            const file = input.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async function() {
                const typedarray = new Uint8Array(this.result);
                const pdf = await pdfjsLib.getDocument(typedarray).promise;
                const page = await pdf.getPage(1);
                const textContent = await page.getTextContent();
                
                // Mapeia todas as linhas de texto para encontrar a posição correta
                const lines = textContent.items.map(s => s.str);
                const fullText = lines.join(' ');

                let clienteEncontrado = "CLIENTE DESCONHECIDO";
                
                // Lógica Master: Procura a linha do cabeçalho do pagador
                for (let i = 0; i < lines.length; i++) {
                    if (lines[i].includes("Nome do Pagador/CPF/CNPJ/Endereço/Cidade/UF/CEP") || lines[i].includes("Nome do Pagador")) {
                        // O nome do cliente está sempre na sequência de dados abaixo dessa marcação
                        // Filtramos para pegar apenas a parte do nome antes da barra ou CPF
                        clienteEncontrado = lines[i+2] || lines[i+1]; 
                        if(clienteEncontrado.includes("/")) {
                            clienteEncontrado = clienteEncontrado.split("/")[0].trim();
                        }
                        break;
                    }
                }

                // Extração de Valor e Vencimento
                const valorMatch = fullText.match(/(\d{1,3}(\.\d{3})*,\d{2})/);
                const valor = valorMatch ? parseFloat(valorMatch[0].replace('.','').replace(',','.')) : 0;
                const dataMatch = fullText.match(/(\d{2}\/\d{2}\/\d{4})/);
                let vencimento = new Date().toISOString().split('T')[0];
                if(dataMatch) {
                    const [d, m, y] = dataMatch[0].split('/');
                    vencimento = `${y}-${m}-${d}`;
                }

                const { error } = await _db.from('controle_financeiro').insert([{
                    cliente: clienteEncontrado.toUpperCase(),
                    valor_nominal: valor,
                    vencimento: vencimento,
                    status: "pendente"
                }]);

                if (!error) {
                    alert(`SUCESSO: Boleto de ${clienteEncontrado} importado.`);
                    carregarContabilidade();
                }
            };
            reader.readAsArrayBuffer(file);
        }

        async function carregarContabilidade() {
            const { data, error } = await _db.from('controle_financeiro').select('*');
            if (error) return;

            const hoje = new Date(); hoje.setHours(0,0,0,0);
            let totals = { hoje: 0, mes: 0, ano: 0, total: 0 };
            let rankingValor = {};

            const corpo = document.getElementById('audit-body');
            corpo.innerHTML = '';

            data.sort((a, b) => new Date(a.vencimento) - new Date(b.vencimento)).forEach(item => {
                const venci = new Date(item.vencimento + 'T12:00:00');
                const valor = item.valor_nominal;

                if (item.status === 'pago') {
                    rankingValor[item.cliente] = (rankingValor[item.cliente] || 0) + valor;
                } else {
                    totals.total += valor;
                    if (venci.toDateString() === hoje.toDateString()) totals.hoje += valor;
                    if (venci.getMonth() === hoje.getMonth() && venci.getFullYear() === hoje.getFullYear()) totals.mes += valor;
                    if (venci.getFullYear() === hoje.getFullYear()) totals.ano += valor;

                    corpo.innerHTML += `
                        <tr class="hover:bg-blue-600/5 transition border-b border-gray-800/50">
                            <td class="p-5"><span class="text-sm font-black text-white uppercase">${item.cliente}</span><br><span class="text-[9px] text-slate-500 font-bold">VENCIMENTO: ${venci.toLocaleDateString()}</span></td>
                            <td class="p-5 text-right font-black text-white">R$ ${valor.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</td>
                            <td class="p-5 text-right flex gap-2 justify-end">
                                <button onclick="baixar(${item.id})" class="text-[9px] font-black uppercase py-2 px-4 rounded bg-emerald-600/20 text-emerald-500 hover:bg-emerald-600 hover:text-white transition">Baixa</button>
                                <button onclick="window.open('https://wa.me/55?text=Ola, boleto EURO DIESEL em aberto')" class="text-[9px] font-black uppercase py-2 px-4 rounded bg-blue-600/20 text-blue-500 hover:bg-blue-600 hover:text-white transition">Cobrar</button>
                            </td>
                        </tr>`;
                }
            });

            document.getElementById('rec-hoje').innerText = "R$ " + totals.hoje.toLocaleString('pt-BR', {minimumFractionDigits: 2});
            document.getElementById('rec-mes').innerText = "R$ " + totals.mes.toLocaleString('pt-BR', {minimumFractionDigits: 2});
            document.getElementById('rec-ano').innerText = "R$ " + totals.ano.toLocaleString('pt-BR', {minimumFractionDigits: 2});
            document.getElementById('rec-total').innerText = "R$ " + totals.total.toLocaleString('pt-BR', {minimumFractionDigits: 2});
            document.getElementById('total-titulos').innerText = data.filter(x => x.status === 'pendente').length + " TÍTULOS ATIVOS";

            renderChart('chartFast', rankingValor);
        }

        function renderChart(id, dados) {
            const ctx = document.getElementById(id).getContext('2d');
            const sorted = Object.entries(dados).sort((a, b) => b[1] - a[1]).slice(0, 5);
            if(window.mainChart) window.mainChart.destroy();
            window.mainChart = new Chart(ctx, {
                type: 'bar',
                data: { labels: sorted.map(x => x[0].substring(0,12)), datasets: [{ data: sorted.map(x => x[1]), backgroundColor: '#0062ff', borderRadius: 4 }] },
                options: { indexAxis: 'y', plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { ticks: { color: '#64748b', font: { size: 9, weight: 'bold' } } } } }
            });
        }

        async function baixar(id) {
            await _db.from('controle_financeiro').update({ status: 'pago', data_pagamento: new Date().toISOString() }).eq('id', id);
            carregarContabilidade();
        }

        async function gerarRelatorioBI() {
            const { data } = await _db.from('controle_financeiro').select('*');
            const win = window.open("", "_blank");
            
            const stats = (days) => {
                const limit = new Date(); limit.setDate(limit.getDate() - days);
                let ranking = {};
                data.filter(x => x.status === 'pago' && new Date(x.data_pagamento) >= limit)
                    .forEach(i => {
                        if(!ranking[i.cliente]) ranking[i.cliente] = { valor: 0, qtd: 0 };
                        ranking[i.cliente].valor += i.valor_nominal;
                        ranking[i.cliente].qtd += 1;
                    });
                return Object.entries(ranking).sort((a, b) => b[1].valor - a[1].valor);
            };

            const rMes = stats(30);
            const r6Mes = stats(180);
            const r12Mes = stats(365);

            win.document.write(`
                <html><head><title>BI LUXO | EURO DIESEL</title>
                <script src="https://cdn.jsdelivr.net/npm/chart.js"><\/script>
                <style>
                    body { font-family: 'Inter', sans-serif; background: #0a0c10; color: white; padding: 40px; }
                    .card { background: #0d1117; padding: 25px; border-radius: 15px; border: 1px solid #1f2937; margin-bottom: 20px; }
                    h1 { text-transform: uppercase; border-left: 4px solid #0062ff; padding-left: 15px; margin-bottom: 30px; letter-spacing: -1px; }
                    .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }
                    h3 { font-size: 10px; color: #64748b; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 20px; }
                </style></head><body>
                <h1>INTELIGÊNCIA DE CLIENTES - LEANDRIN® MASTER</h1>
                <div class="grid">
                    <div class="card"><h3>Ranking 30 Dias (Valor vs Qtd)</h3><canvas id="c1"></canvas></div>
                    <div class="card"><h3>Ranking 6 Meses (Valor vs Qtd)</h3><canvas id="c2"></canvas></div>
                    <div class="card"><h3>Ranking 12 Meses (Valor vs Qtd)</h3><canvas id="c3"></canvas></div>
                </div>
                <script>
                    const cfg = (id, data) => new Chart(document.getElementById(id), {
                        type: 'bar', data: { 
                            labels: data.map(x => x[0] + " [" + x[1].qtd + " boletos]"), 
                            datasets: [{ data: data.map(x => x[1].valor), backgroundColor: '#0062ff' }] 
                        },
                        options: { indexAxis: 'y', plugins: { legend: { display: false } }, scales: { y: { ticks: { color: 'white', font: { size: 10, weight: 'bold' } } } } }
                    });
                    cfg('c1', ${JSON.stringify(rMes)});
                    cfg('c2', ${JSON.stringify(r6Mes)});
                    cfg('c3', ${JSON.stringify(r12Mes)});
                <\/script></body></html>
            `);
        }

        carregarContabilidade();
    </script>
</body>
</html>
