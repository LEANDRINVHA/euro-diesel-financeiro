<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>EURO DIESEL | Contabilidade de Precisão</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://unpkg.com/tesseract.js@v4.0.1/dist/tesseract.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        .card-stats { border-top: 4px solid #3b82f6; transition: transform 0.2s; }
        .card-stats:hover { transform: translateY(-5px); }
        .bg-euro { background-color: #0f172a; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <nav class="bg-slate-900 text-white p-4 shadow-2xl">
        <div class="container mx-auto flex justify-between items-center">
            <div>
                <span class="text-2xl font-black tracking-widest text-blue-400">EURO DIESEL</span>
                <span class="ml-2 text-xs uppercase tracking-tighter text-slate-400">Sistema Master de Recebíveis</span>
            </div>
            <div class="font-bold border-l pl-4 border-slate-700 uppercase">Leandrin®</div>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4">
        <div class="grid grid-cols-1 md:grid-cols-5 gap-4 mb-8 text-center">
            <div class="bg-white p-4 rounded-xl shadow card-stats">
                <p class="text-xs text-gray-500 font-bold uppercase">Hoje</p>
                <h2 id="valor-hoje" class="text-xl font-black text-blue-600">R$ 0,00</h2>
            </div>
            <div class="bg-white p-4 rounded-xl shadow card-stats">
                <p class="text-xs text-gray-500 font-bold uppercase">Esta Semana</p>
                <h2 id="valor-semana" class="text-xl font-black text-blue-600">R$ 0,00</h2>
            </div>
            <div class="bg-white p-4 rounded-xl shadow card-stats">
                <p class="text-xs text-gray-500 font-bold uppercase">Este Mês</p>
                <h2 id="valor-mes" class="text-xl font-black text-blue-600">R$ 0,00</h2>
            </div>
            <div class="bg-white p-4 rounded-xl shadow card-stats">
                <p class="text-xs text-gray-500 font-bold uppercase">Este Ano</p>
                <h2 id="valor-ano" class="text-xl font-black text-blue-600">R$ 0,00</h2>
            </div>
            <div class="bg-white p-4 rounded-xl shadow card-stats border-t-green-500">
                <p class="text-xs text-gray-500 font-bold uppercase">Próx. 12 Meses</p>
                <h2 id="valor-futuro" class="text-xl font-black text-green-600">R$ 0,00</h2>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-xl border border-slate-200 overflow-hidden">
            <div class="p-6 bg-slate-50 border-b flex justify-between items-center">
                <h3 class="font-bold text-slate-800 uppercase flex items-center gap-2 text-sm">
                    <span class="w-3 h-3 bg-blue-500 rounded-full"></span> Detalhamento Contábil
                </h3>
                <div class="flex gap-2">
                    <input type="file" id="pdf-upload" class="hidden" accept="application/pdf">
                    <label for="pdf-upload" class="bg-slate-800 text-white px-4 py-2 rounded-lg text-sm font-bold cursor-pointer hover:bg-black transition">
                        📥 Importar PDF (IA Scanner)
                    </label>
                </div>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="bg-slate-100 text-slate-600 text-[10px] uppercase font-black">
                            <th class="p-4">Status / Cliente</th>
                            <th class="p-4 text-center">Vencimento</th>
                            <th class="p-4 text-right">Valor Nominal</th>
                            <th class="p-4 text-right">Multa (5%)</th>
                            <th class="p-4 text-right">Juros (0,17%/d)</th>
                            <th class="p-4 text-right bg-blue-50 text-blue-700 font-black">Líquido Atualizado</th>
                        </tr>
                    </thead>
                    <tbody id="tabela-contabil" class="divide-y divide-slate-100 text-xs"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const SUPABASE_URL = 'https://sfpdbzfaiyrhwitiflbv.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNmcGRiemZhaXlyaHdpdGlmbGJ2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNTg0MzgsImV4cCI6MjA5MDgzNDQzOH0.t84JuNn-qqBJyb-IPK0x4fbYTfsJK_R80Rp4SBpsupM';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        // === FUNÇÃO 1: PROCESSAMENTO DE PDF COM IA ===
        document.getElementById('pdf-upload').addEventListener('change', async (event) => {
            const file = event.target.files[0];
            if (!file) return;

            alert("Leandrin®, a IA está auditando o boleto... Aguarde.");

            const reader = new FileReader();
            reader.onload = async function() {
                const typedarray = new Uint8Array(this.result);
                const pdf = await pdfjsLib.getDocument(typedarray).promise;
                const page = await pdf.getPage(1);
                
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');
                const viewport = page.getViewport({ scale: 2.5 });
                canvas.height = viewport.height;
                canvas.width = viewport.width;
                await page.render({ canvasContext: context, viewport: viewport }).promise;

                const { data: { text, confidence } } = await Tesseract.recognize(canvas, 'por');
                
                // Regex para extração
                const extrairValor = text.match(/R\$\s?(\d+[,.]\d{2})/);
                const extrairVencimento = text.match(/(\d{2}\/\d{2}\/\d{4})/);

                const boletoAuditado = {
                    valor_nominal: extrairValor ? parseFloat(extrairValor[1].replace(',', '.')) : 0,
                    vencimento: extrairVencimento ? converterData(extrairVencimento[1]) : null,
                    cliente: "CLIENTE IDENTIFICADO VIA IA",
                    status: 'pendente'
                };

                if (!boletoAuditado.vencimento || boletoAuditado.valor_nominal <= 0) {
                    alert("A IA não confirmou os dados. Verifique o PDF.");
                    return;
                }

                const { error } = await _supabase.from('controle_financeiro').insert([boletoAuditado]);
                if (!error) {
                    alert("Novo boleto salvo!");
                    processarFinanceiro();
                }
            };
            reader.readAsArrayBuffer(file);
        });

        function converterData(dataBr) {
            const [dia, mes, ano] = dataBr.split('/');
            return `${ano}-${mes}-${dia}`;
        }

        // === FUNÇÃO 2: RENDERIZAÇÃO E CÁLCULOS CONTÁBEIS ===
        async function processarFinanceiro() {
            const { data, error } = await _supabase.from('controle_financeiro').select('*').order('vencimento', { ascending: true });
            if (error) return;

            let totais = { hoje: 0, semana: 0, mes: 0, ano: 0, futuro: 0 };
            const corpo = document.getElementById('tabela-contabil');
            corpo.innerHTML = '';
            const hoje = new Date(); hoje.setHours(0,0,0,0);

            data.forEach(item => {
                const venci = new Date(item.vencimento + 'T12:00:00'); 
                const diffDias = Math.floor((hoje - venci) / (1000 * 60 * 60 * 24));
                
                let multa = 0; let juros = 0;
                if (diffDias > 0) {
                    multa = item.valor_nominal * 0.05;
                    juros = item.valor_nominal * (0.0017 * diffDias);
                }
                const totalFinal = item.valor_nominal + multa + juros;

                // Lógica de Soma dos Cards
                const diffFuturo = Math.floor((venci - hoje) / (1000 * 60 * 60 * 24));
                if (diffFuturo === 0) totais.hoje += totalFinal;
                if (diffFuturo >= 0 && diffFuturo <= 7) totais.semana += totalFinal;
                if (venci.getMonth() === hoje.getMonth() && venci.getFullYear() === hoje.getFullYear()) totais.mes += totalFinal;
                if (venci.getFullYear() === hoje.getFullYear()) totais.ano += totalFinal;
                if (diffFuturo >= 0 && diffFuturo <= 365) totais.futuro += totalFinal;

                corpo.innerHTML += `
                    <tr class="hover:bg-slate-50 transition">
                        <td class="p-4 font-bold text-slate-800">
                            <span class="text-[9px] uppercase ${diffDias > 0 ? 'text-red-500' : 'text-green-500'}">
                                ${diffDias > 0 ? '● ATRASADO ('+diffDias+'d)' : '● NO PRAZO'}
                            </span><br>
                            ${item.cliente}
                        </td>
                        <td class="p-4 text-center font-medium">${venci.toLocaleDateString('pt-BR')}</td>
                        <td class="p-4 text-right">R$ ${item.valor_nominal.toFixed(2)}</td>
                        <td class="p-4 text-right text-red-500">R$ ${multa.toFixed(2)}</td>
                        <td class="p-4 text-right text-red-500">R$ ${juros.toFixed(2)}</td>
                        <td class="p-4 text-right bg-blue-50 font-black text-blue-700">R$ ${totalFinal.toFixed(2)}</td>
                    </tr>`;
            });

            document.getElementById('valor-hoje').innerText = `R$ ${totais.hoje.toFixed(2)}`;
            document.getElementById('valor-semana').innerText = `R$ ${totais.semana.toFixed(2)}`;
            document.getElementById('valor-mes').innerText = `R$ ${totais.mes.toFixed(2)}`;
            document.getElementById('valor-ano').innerText = `R$ ${totais.ano.toFixed(2)}`;
            document.getElementById('valor-futuro').innerText = `R$ ${totais.futuro.toFixed(2)}`;
        }

        processarFinanceiro();
    </script>
</body>
</html>
