<script>
        const CONFIG = {
            url: "https://sfpdbzfaiyrhwitiflbv.supabase.co",
            key: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNmcGRiemZhaXlyaHdpdGlmbGJ2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNTg0MzgsImV4cCI6MjA5MDgzNDQzOH0.t84JuNn-qqBJyb-IPK0x4fbYTfsJK_R80Rp4SBpsupM",
            zap: "5569981128233",
            nome: "Leandrin®"
        };
        const _db = supabase.createClient(CONFIG.url, CONFIG.key);

        // --- NOVIDADE: ESCUTADOR DO BOTÃO DE IMPORTAR ---
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                processarBoleto(file);
            }
        });

        async function processarBoleto(file) {
            // Simulando a extração de dados da IA baseada no seu PDF da Andreis Transportes
            console.log("Iniciando Auditoria IA no arquivo:", file.name);
            
            // Dados extraídos do seu documento: Andreis Transportes / R$ 520,00 / Venc: 23/04/2026
            const novoTitulo = {
                cliente: "ANDREIS TRANSPORTES LTDA",
                valor_nominal: 520.00,
                vencimento: "2026-04-23",
                status: "pendente"
            };

            const { data, error } = await _db.from('controle_financeiro').insert([novoTitulo]);
            
            if (error) {
                alert("Erro ao salvar no banco: " + error.message);
            } else {
                alert("Boleto da " + novoTitulo.cliente + " auditado e salvo com sucesso!");
                carregarContabilidade(); // Recarrega a tela
            }
        }

        async function carregarContabilidade() {
            const { data, error } = await _db.from('controle_financeiro').select('*').order('vencimento', { ascending: true });
            if (error) return;

            const hoje = new Date(); hoje.setHours(0,0,0,0);
            const fimSemana = new Date(hoje); fimSemana.setDate(hoje.getDate() + 7);
            const fimMes = new Date(hoje.getFullYear(), hoje.getMonth() + 1, 0);
            const fimAno = new Date(hoje.getFullYear(), 11, 31);
            const fim12Meses = new Date(hoje); fim12Meses.setMonth(hoje.getMonth() + 12);

            let resumo = { hoje: 0, semana: 0, mes: 0, ano: 0, m12: 0, brutoTotal: 0, pago: 0, count: 0 };
            const corpo = document.getElementById('audit-body');
            corpo.innerHTML = '';

            data.forEach(item => {
                const venci = new Date(item.vencimento + 'T12:00:00');
                const diff = Math.floor((hoje - venci) / (1000*60*60*24));
                const multa = (diff > 0 && item.status !== 'pago') ? (item.valor_nominal * 0.05) + (item.valor_nominal * 0.0017 * diff) : 0;
                const total = item.valor_nominal + multa;

                if (item.status === 'pago') {
                    resumo.pago += item.valor_nominal;
                } else {
                    resumo.brutoTotal += total;
                    resumo.count++;

                    if (venci.getTime() === hoje.getTime()) resumo.hoje += total;
                    if (venci >= hoje && venci <= fimSemana) resumo.semana += total;
                    if (venci >= hoje && venci <= fimMes) resumo.mes += total;
                    if (venci >= hoje && venci <= fimAno) resumo.ano += total;
                    if (venci >= hoje && venci <= fim12Meses) resumo.m12 += total;

                    corpo.innerHTML += `
                        <tr class="hover:bg-blue-600/5 transition">
                            <td class="p-5">
                                <div class="flex flex-col">
                                    <span class="text-sm font-black text-slate-100 uppercase">${item.cliente}</span>
                                    <span class="text-[9px] font-bold ${diff > 0 ? 'text-red-500' : 'text-slate-500'} uppercase">
                                        Vencimento: ${venci.toLocaleDateString('pt-BR')} ${diff > 0 ? '— '+diff+' DIAS ATRASO' : ''}
                                    </span>
                                </div>
                            </td>
                            <td class="p-5 text-right">
                                <span class="text-sm font-black text-white text-mono">R$ ${total.toFixed(2)}</span>
                            </td>
                            <td class="p-5 text-center">
                                <div class="flex gap-2 justify-center">
                                    <button onclick="baixar(${item.id})" class="text-[9px] font-black uppercase py-2 px-4 rounded bg-emerald-600/20 text-emerald-500 hover:bg-emerald-600 hover:text-white transition">Baixa</button>
                                    <button onclick="cobrar('${item.cliente}', '${total.toFixed(2)}')" class="text-[9px] font-black uppercase py-2 px-4 rounded bg-blue-600/20 text-blue-500 border border-blue-500/30 hover:bg-blue-600 hover:text-white transition">Cobrar</button>
                                </div>
                            </td>
                        </tr>`;
                }
            });

            const fmt = (v) => v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
            
            document.getElementById('rec-hoje').innerText = fmt(resumo.hoje);
            document.getElementById('rec-semana').innerText = fmt(resumo.semana);
            document.getElementById('rec-mes').innerText = fmt(resumo.mes);
            document.getElementById('rec-ano').innerText = fmt(resumo.ano);
            document.getElementById('rec-12meses').innerText = fmt(resumo.m12);
            document.getElementById('total-titulos').innerText = `${resumo.count} TÍTULOS ATIVOS`;

            document.getElementById('dre-list').innerHTML = `
                ${renderLinhaDRE("Faturamento Projetado", resumo.brutoTotal, "text-white")}
                ${renderLinhaDRE("(-) Simples Nac. (6%)", -(resumo.brutoTotal * 0.06), "text-red-500")}
                ${renderLinhaDRE("(-) Despesas Op. (34%)", -(resumo.brutoTotal * 0.34), "text-red-400")}
                <hr class="border-gray-800">
                ${renderLinhaDRE("LUCRO LÍQUIDO EST.", (resumo.brutoTotal * 0.6), "text-emerald-400 font-black")}
            `;

            renderChart(resumo.pago, resumo.brutoTotal);
        }

        function renderLinhaDRE(label, valor, cor) {
            return `<div class="flex justify-between text-[10px] font-bold uppercase">
                <span class="text-slate-500">${label}</span>
                <span class="${cor} text-mono">R$ ${valor.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</span>
            </div>`;
        }

        function cobrar(cliente, valor) {
            const msg = `Olá, aqui é o *${CONFIG.nome}* da Euro Diesel. Constatamos um título de *R$ ${valor}* pendente. Poderia nos enviar o comprovante?`;
            window.open(`https://wa.me/${CONFIG.zap}?text=${encodeURIComponent(msg)}`, '_blank');
        }

        async function baixar(id) {
            if(confirm("Confirmar recebimento deste título?")) {
                await _db.from('controle_financeiro').update({ status: 'pago' }).eq('id', id);
                carregarContabilidade();
            }
        }

        function gerarRelatorio() {
            const dataStr = new Date().toLocaleDateString('pt-BR');
            let conteudo = `RELATÓRIO FINANCEIRO EURO DIESEL - ${dataStr}\n`;
            conteudo += `RESPONSÁVEL: ${CONFIG.nome}\n`;
            conteudo += `-------------------------------------------\n\n`;
            
            const linhas = document.querySelectorAll('#audit-body tr');
            linhas.forEach(l => {
                const cli = l.querySelector('span.text-sm').innerText;
                const val = l.querySelector('span.text-mono').innerText;
                conteudo += `CLIENTE: ${cli} | VALOR: ${val}\n`;
            });

            const blob = new Blob([conteudo], { type: 'text/plain' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `FINANCEIRO_EURODIESEL_${dataStr.replace(/\//g, '-')}.txt`;
            link.click();
        }

        let chart;
        function renderChart(pago, pend) {
            const ctx = document.getElementById('chartBI').getContext('2d');
            if(chart) chart.destroy();
            chart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Realizado', 'Pendente'],
                    datasets: [{
                        data: [pago, pend],
                        backgroundColor: ['#0062ff', '#1f2937'],
                        borderWidth: 0
                    }]
                },
                options: { cutout: '85%', plugins: { legend: { display: false } } }
            });
        }

        carregarContabilidade();
    </script>
